name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install vcpkg dependencies
        run: vcpkg install --triplet x64-windows

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DUSE_CUDA=OFF `
            -DUSE_LOCAL_LLM=OFF `
            -DUSE_FAISS=OFF `
            -DUSE_ONNX=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --target closecrab-unified

      - name: Package
        shell: bash
        run: |
          mkdir -p package/CloseCrab
          cp build/Release/closecrab-unified.exe package/CloseCrab/
          cp build/Release/*.dll package/CloseCrab/ 2>/dev/null || true
          cp config/config.yaml.example package/CloseCrab/config.yaml 2>/dev/null || true
          cd package && 7z a -tzip ../CloseCrab-Windows-x64.zip CloseCrab/

      - name: Build installer
        run: |
          choco install innosetup -y
          iscc installer\closecrab.iss
        continue-on-error: true

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: CloseCrab-Windows-x64
          path: CloseCrab-Windows-x64.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        if: hashFiles('installer/Output/*.exe') != ''
        with:
          name: CloseCrab-Windows-Setup
          path: installer/Output/*.exe

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libcurl4-openssl-dev \
            zlib1g-dev \
            libssl-dev

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DUSE_CUDA=OFF \
            -DUSE_LOCAL_LLM=ON \
            -DUSE_FAISS=OFF \
            -DUSE_ONNX=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --target closecrab-unified

      - name: Package
        run: |
          mkdir -p package/CloseCrab
          cp build/closecrab-unified package/CloseCrab/
          cp config/config.yaml.example package/CloseCrab/config.yaml 2>/dev/null || true
          tar -czf CloseCrab-Linux-x86_64.tar.gz -C package CloseCrab

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloseCrab-Linux-x86_64
          path: CloseCrab-Linux-x86_64.tar.gz

  build-macos-arm64:
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install ninja

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DUSE_CUDA=OFF \
            -DUSE_LOCAL_LLM=ON \
            -DUSE_FAISS=OFF \
            -DUSE_ONNX=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --target closecrab-unified

      - name: Package
        run: |
          mkdir -p package/CloseCrab
          cp build/closecrab-unified package/CloseCrab/
          cp config/config.yaml.example package/CloseCrab/config.yaml 2>/dev/null || true

          # Create .pkg installer (macOS standard for CLI tools)
          mkdir -p pkg_root/usr/local/bin
          mkdir -p pkg_root/usr/local/etc/closecrab
          cp build/closecrab-unified pkg_root/usr/local/bin/
          cp config/config.yaml.example pkg_root/usr/local/etc/closecrab/config.yaml 2>/dev/null || true
          pkgbuild --root pkg_root \
            --identifier com.blitzball.closecrab \
            --version "${{ github.ref_name }}" \
            --install-location / \
            CloseCrab-macOS-arm64.pkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloseCrab-macOS-arm64
          path: CloseCrab-macOS-arm64.pkg

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            CloseCrab-Windows-x64/CloseCrab-Windows-x64.zip
            CloseCrab-Linux-x86_64/CloseCrab-Linux-x86_64.tar.gz
            CloseCrab-macOS-arm64/CloseCrab-macOS-arm64.pkg
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
