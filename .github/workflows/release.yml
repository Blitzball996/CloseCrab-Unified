name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install vcpkg dependencies
        run: vcpkg install --triplet x64-windows

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DUSE_CUDA=OFF `
            -DUSE_LOCAL_LLM=OFF `
            -DUSE_FAISS=OFF `
            -DUSE_ONNX=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --target closecrab-unified

      - name: Package
        shell: bash
        run: |
          mkdir -p package/CloseCrab
          cp build/Release/closecrab-unified.exe package/CloseCrab/
          cp build/Release/*.dll package/CloseCrab/ 2>/dev/null || true
          cp config/config.yaml.example package/CloseCrab/config.yaml 2>/dev/null || true
          cd package && 7z a -tzip ../CloseCrab-Windows-x64.zip CloseCrab/

      - name: Build installer
        run: |
          choco install innosetup -y
          iscc installer\closecrab.iss
        continue-on-error: true

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: CloseCrab-Windows-x64
          path: CloseCrab-Windows-x64.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        if: hashFiles('installer/Output/*.exe') != ''
        with:
          name: CloseCrab-Windows-Setup
          path: installer/Output/*.exe

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libcurl4-openssl-dev \
            zlib1g-dev \
            libssl-dev

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DUSE_CUDA=OFF \
            -DUSE_LOCAL_LLM=ON \
            -DUSE_FAISS=OFF \
            -DUSE_ONNX=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --target closecrab-unified

      - name: Package
        run: |
          mkdir -p package/CloseCrab
          cp build/closecrab-unified package/CloseCrab/
          cp config/config.yaml.example package/CloseCrab/config.yaml 2>/dev/null || true
          tar -czf CloseCrab-Linux-x86_64.tar.gz -C package CloseCrab

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloseCrab-Linux-x86_64
          path: CloseCrab-Linux-x86_64.tar.gz

  build-macos:
    name: build-macos (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon (M1) — native arm64
            arch: arm64
          - runner: macos-13   # Intel — native x86_64
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.15"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install ninja

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}" \
            -DUSE_CUDA=OFF \
            -DUSE_LOCAL_LLM=OFF \
            -DUSE_FAISS=OFF \
            -DUSE_ONNX=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --target closecrab-unified

      - name: Resolve version
        id: ver
        run: |
          REF="${{ github.ref_name }}"
          case "$REF" in
            v*) VER="${REF#v}" ;;
            *)  VER="0.0.0-dev" ;;
          esac
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Package (.tar.gz)
        run: |
          mkdir -p package/CloseCrab
          cp build/closecrab-unified package/CloseCrab/
          cp config/config.yaml package/CloseCrab/config.yaml 2>/dev/null || true
          cp README.md package/CloseCrab/ 2>/dev/null || true
          cp LICENSE package/CloseCrab/ 2>/dev/null || true
          tar -czf CloseCrab-macOS-${{ matrix.arch }}.tar.gz -C package CloseCrab

      - name: Package (.pkg)
        run: |
          mkdir -p pkg_root/usr/local/bin
          mkdir -p pkg_root/usr/local/etc/closecrab
          cp build/closecrab-unified pkg_root/usr/local/bin/
          cp config/config.yaml pkg_root/usr/local/etc/closecrab/config.yaml 2>/dev/null || true
          pkgbuild --root pkg_root \
            --identifier com.blitzball.closecrab \
            --version "${{ steps.ver.outputs.version }}" \
            --install-location / \
            CloseCrab-macOS-${{ matrix.arch }}.pkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloseCrab-macOS-${{ matrix.arch }}
          path: |
            CloseCrab-macOS-${{ matrix.arch }}.pkg
            CloseCrab-macOS-${{ matrix.arch }}.tar.gz

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            CloseCrab-Windows-x64/CloseCrab-Windows-x64.zip
            CloseCrab-Linux-x86_64/CloseCrab-Linux-x86_64.tar.gz
            CloseCrab-macOS-arm64/CloseCrab-macOS-arm64.pkg
            CloseCrab-macOS-arm64/CloseCrab-macOS-arm64.tar.gz
            CloseCrab-macOS-x86_64/CloseCrab-macOS-x86_64.pkg
            CloseCrab-macOS-x86_64/CloseCrab-macOS-x86_64.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
