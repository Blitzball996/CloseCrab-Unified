name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CloseCrab ${{ github.ref_name }}"
          body: |
            ## CloseCrab ${{ github.ref_name }} — Team Mode Release

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `CloseCrab-Unified_Setup.exe` | CUDA GPU acceleration, Inno Setup installer |
            | macOS | `CloseCrab-Unified.dmg` | Universal binary (Intel + Apple Silicon), CPU-only |
            | Linux | `CloseCrab-Unified-linux-x86_64.tar.gz` | Portable binary, CPU-only |

            ### What's New in v0.2.0
            - **Team Mode**: Multiple developers connect to one server with independent conversations
            - **Parallel Inference**: True parallel decode (API: concurrent HTTP, Local: llama.cpp n_parallel)
            - **Gamification**: Leaderboard, achievements, coding stats
            - **Dashboard**: Apple-style GUI to start/stop backend from your phone
            - **Shared Knowledge**: Team Q&A indexed and searchable across sessions
            - **Session Persistence**: Save and restore collaboration sessions

            ### Quick Start
            ```bash
            # Windows: download and run the installer
            # macOS: mount DMG, drag to Applications, run from terminal
            # Linux: tar xzf CloseCrab-Unified-linux-x86_64.tar.gz && ./closecrab-unified
            ```

            ### Links
            - [User Guide (English)](USER_GUIDE_EN.md)
            - [用户指南 (中文)](USER_GUIDE.md)
            - [Mobile Web UI](https://github.com/Blitzball996/CloseCrab-Web)
          draft: false
          prerelease: false
