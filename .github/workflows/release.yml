name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install vcpkg dependencies
        run: vcpkg install --triplet x64-windows

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DUSE_CUDA=OFF `
            -DUSE_LOCAL_LLM=OFF `
            -DUSE_FAISS=OFF `
            -DUSE_ONNX=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --target closecrab-unified

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          # Ensure the runtime DLLs sit next to the exe. CI builds with
          # USE_LOCAL_LLM/FAISS/ONNX/CUDA=OFF, so the only runtime deps are
          # vcpkg's dynamic curl + zlib (OpenSSL is linked statically into
          # libcurl on the x64-windows triplet). vcpkg's applocal step *should*
          # drop these next to the exe, but copy them explicitly so a missed
          # applocal can't ship a broken build. This also feeds the Inno Setup
          # installer below, which packages build/Release/*.dll.
          VCPKG_BIN="$VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"
          for dll in libcurl.dll zlib1.dll; do
            if [ -f "$VCPKG_BIN/$dll" ]; then
              cp -f "$VCPKG_BIN/$dll" build/Release/
            fi
          done

          # Fail loudly if the core runtime DLL didn't make it — better a red CI
          # than a download that dies with "libcurl.dll is missing".
          if [ ! -f build/Release/libcurl.dll ]; then
            echo "::error::libcurl.dll missing from build/Release — the build would not run."
            echo "build/Release:"; ls -la build/Release/ || true
            echo "$VCPKG_BIN:"; ls -la "$VCPKG_BIN" || true
            exit 1
          fi

          mkdir -p package/CloseCrab/config
          cp build/Release/closecrab.exe package/CloseCrab/
          cp build/Release/*.dll package/CloseCrab/
          cp config/config.yaml.example package/CloseCrab/config/config.yaml
          cp scripts/uninstall.bat package/CloseCrab/ 2>/dev/null || true
          cd package && 7z a -tzip ../CloseCrab-Windows-x64.zip CloseCrab/

      - name: Build installer
        run: |
          choco install innosetup -y
          iscc installer\closecrab.iss

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: CloseCrab-Windows-x64
          path: CloseCrab-Windows-x64.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CloseCrab-Windows-Setup
          path: dist/CloseCrab-Setup-*.exe

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libcurl4-openssl-dev \
            zlib1g-dev \
            libssl-dev

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DUSE_CUDA=OFF \
            -DUSE_LOCAL_LLM=ON \
            -DUSE_FAISS=OFF \
            -DUSE_ONNX=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --target closecrab-unified

      - name: Package
        run: |
          mkdir -p package/CloseCrab
          cp build/closecrab package/CloseCrab/
          cp config/config.yaml.example package/CloseCrab/config.yaml 2>/dev/null || true
          cp scripts/uninstall.sh package/CloseCrab/ 2>/dev/null || true
          chmod +x package/CloseCrab/uninstall.sh 2>/dev/null || true
          tar -czf CloseCrab-Linux-x86_64.tar.gz -C package CloseCrab

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloseCrab-Linux-x86_64
          path: CloseCrab-Linux-x86_64.tar.gz

  build-macos:
    name: build-macos (universal)
    runs-on: macos-14   # Apple Silicon runner cross-builds a universal (arm64 + x86_64) binary
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.15"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install ninja

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DUSE_CUDA=OFF \
            -DUSE_LOCAL_LLM=OFF \
            -DUSE_FAISS=OFF \
            -DUSE_ONNX=OFF

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}} --target closecrab-unified

      - name: Verify universal binary
        run: lipo -info build/closecrab

      - name: Resolve version
        id: ver
        run: |
          REF="${{ github.ref_name }}"
          case "$REF" in
            v*) VER="${REF#v}" ;;
            *)  VER="0.0.0-dev" ;;
          esac
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Package (.tar.gz)
        run: |
          mkdir -p package/CloseCrab
          # Install as `closecrab` (short command name, per user request)
          cp build/closecrab package/CloseCrab/closecrab
          chmod +x package/CloseCrab/closecrab
          cp README.md package/CloseCrab/ 2>/dev/null || true
          cp LICENSE package/CloseCrab/ 2>/dev/null || true
          cp scripts/uninstall.sh package/CloseCrab/ 2>/dev/null || true
          chmod +x package/CloseCrab/uninstall.sh 2>/dev/null || true
          tar -czf CloseCrab-macOS-universal.tar.gz -C package CloseCrab

      - name: Package (.pkg)
        run: |
          # --- payload: single short-named binary in /usr/local/bin ---
          mkdir -p pkg_root/usr/local/bin
          cp build/closecrab pkg_root/usr/local/bin/closecrab
          chmod +x pkg_root/usr/local/bin/closecrab
          # NOTE: config.yaml is intentionally NOT shipped — the app auto-creates
          # ~/.crab/config.yaml on first run (see main.cpp resolveConfigPath).

          # --- postinstall: strip the quarantine flag so the binary runs without
          # the "unidentified developer" gatekeeper prompt, no manual xattr needed ---
          mkdir -p pkg_scripts
          cat > pkg_scripts/postinstall <<'SH'
          #!/bin/bash
          /usr/bin/xattr -dr com.apple.quarantine /usr/local/bin/closecrab 2>/dev/null || true
          /bin/chmod +x /usr/local/bin/closecrab 2>/dev/null || true
          exit 0
          SH
          chmod +x pkg_scripts/postinstall

          pkgbuild --root pkg_root \
            --scripts pkg_scripts \
            --identifier com.blitzball.closecrab \
            --version "${{ steps.ver.outputs.version }}" \
            --install-location / \
            CloseCrab-macOS-universal.pkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloseCrab-macOS-universal
          path: |
            CloseCrab-macOS-universal.pkg
            CloseCrab-macOS-universal.tar.gz

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            CloseCrab-Windows-x64/CloseCrab-Windows-x64.zip
            CloseCrab-Windows-Setup/CloseCrab-Setup-*.exe
            CloseCrab-Linux-x86_64/CloseCrab-Linux-x86_64.tar.gz
            CloseCrab-macOS-universal/CloseCrab-macOS-universal.pkg
            CloseCrab-macOS-universal/CloseCrab-macOS-universal.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
